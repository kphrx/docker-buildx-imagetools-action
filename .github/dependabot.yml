version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      rollup:
        patterns:
          - "rollup"
          - "@rollup/*"
      jest:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/"
          - "@typescript-eslint/*"
      eslint:
        patterns:
          - "jest"
          - "@types/jest"
          - "ts-jest"
          - "ts-jest-resolver"
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
